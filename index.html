<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร้านขนมหวานและชานมไข่มุก</title>

<style>
    /* กำหนดค่าพื้นฐาน */
    body{
        margin:0;
        font-family: Arial, sans-serif;
        background:#fdf6f0;
    }

    /* เมนูด้านบน */
    .navbar{
        position: fixed;
        top: 0;
        width: 100%;
        background: #ff69b4;
        padding: 15px 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        z-index: 1000;
    }

    .navbar ul{
        list-style: none;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    .navbar ul li{
        display: inline;
        margin: 0 20px;
    }

    .navbar ul li a{
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
        padding: 8px 15px;
        border-radius: 5px;
        transition: 0.3s;
    }

    .navbar ul li a:hover{
        background: white;
        color: #ff69b4;
    }

    /* เนื้อหา */
    .content{
        margin-top: 90px;
        padding: 20px;
        text-align: center;
    }

    section{
        padding: 50px 20px;
    }

    h2{
        color: #ff69b4;
    }
</style>
</head>
<body>

<!-- เมนู -->
<nav class="navbar">
    <ul>
        <li><a href="#home">หน้าแรก</a></li>
        <li><a href="#about">เกี่ยวกับเรา</a></li>
        <li><a href="#service">บริการ</a></li>
        <li><a href="#contact">ติดต่อ</a></li>
    </ul>
</nav>

<div class="content">

    <section id="home">
        <h2>หน้าแรก</h2>
        <p>ยินดีต้อนรับสู่ร้านขนมหวานและชานมไข่มุก</p>
    </section>

    <section id="about">
        <h2>เกี่ยวกับเรา</h2>
        <p>พิมพ์ธนัฏชา แฝงราช</p>
    </section>

    <section id="service">
        <h2>บริการ</h2>
        <p></p>
    </section>ขนมหวานและชานมไข่มุก

    <section id="contact">
        <h2>ติดต่อ</h2>
        <p>0865423xxx</p>
    </section>

</div>

</body>
</html>.navbar{
    position: fixed;
    top: 0;
    width: 100%;
}
